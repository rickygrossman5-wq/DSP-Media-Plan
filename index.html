<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLTFRM — DSP Media Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://rickygrossman5-wq.github.io/cac-analyzer/styles.css">
<style>
  :root {
    --black:    #0C0C0A;
    --ink:      #161614;
    --card:     #1E1E1C;
    --card-2:   #252523;
    --line:     rgba(255,255,255,.13);
    --line-soft: rgba(255,255,255,.06);
    --white:    #F0F0EB;
    --gray:     #9A9A92;
    --gray-dim: #5E5E58;
    --green:    #3ECF74;
    --red:      #F05252;
    --sans:     'Archivo', system-ui, sans-serif;
    --mono:     'DM Mono', Menlo, monospace;
    --t1: var(--white); --t2: var(--gray); --t3: var(--gray-dim);
    --s: var(--green); --d: var(--red);
    --m: var(--mono);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--black); color: var(--white); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 128px; opacity: .5;
  }
  .container { max-width: 1060px; margin: 0 auto; position: relative; z-index: 1; }
  #app-title, .app-title { font-family: var(--sans); font-size: 20px; font-weight: 700; color: var(--white); letter-spacing: .04em; text-transform: uppercase; }
  .results-title { font-family: var(--sans); font-size: 17px; font-weight: 600; color: var(--white); }
  .results-sub { font-family: var(--mono); font-size: 11px; color: var(--gray-dim); margin-top: 4px; }
  .slbl { font-family: var(--mono); font-size: 9px; font-weight: 500; color: var(--gray-dim); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  .card, .chg-card, .metric-card { background: var(--card); border-radius: 10px; padding: 18px; border: 1px solid var(--line); }
  .card-2 { background: var(--card-2); }
  .mc-lbl { font-family: var(--mono); font-size: 9px; font-weight: 500; color: var(--gray-dim); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .mc-val { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--white); line-height: 1; }
  .mc-prior { font-family: var(--mono); font-size: 11px; margin-top: 7px; }
  .pos { color: var(--green); } .neg { color: var(--red); } .neu { color: var(--gray-dim); }
  .btn-primary { font-family: var(--sans); font-size: 12px; font-weight: 600; padding: 8px 18px; border-radius: 20px; background: var(--white); color: var(--black); border: 1px solid var(--white); cursor: pointer; transition: opacity .12s; }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary, .rst-btn { font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 7px 16px; border-radius: 20px; background: transparent; color: var(--gray); border: 1px solid var(--line); cursor: pointer; transition: color .12s, border-color .12s; }
  .btn-secondary:hover, .rst-btn:hover { color: var(--white); border-color: rgba(255,255,255,.35); }
  .top-nav { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; border-bottom: 1px solid var(--line); padding-bottom: 16px; }
  .tnav, .vtab, .stab { font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 6px 16px; border: 1px solid var(--line); border-radius: 20px; background: transparent; cursor: pointer; color: var(--gray); transition: color .12s, border-color .12s, background .12s; }
  .tnav:hover, .vtab:hover, .stab:hover { color: var(--white); border-color: rgba(255,255,255,.3); }
  .tnav.on, .vtab.on { background: var(--white); color: var(--black); border-color: var(--white); font-family: var(--sans); font-weight: 600; }
  .stab.on { color: var(--white); border-color: rgba(255,255,255,.45); background: rgba(255,255,255,.07); }
  .badge { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--line); color: var(--gray); background: rgba(255,255,255,.04); }
  .badge-on { border-color: rgba(255,255,255,.2); color: var(--white); }
  input[type="text"], input[type="number"], textarea, select { font-family: var(--sans); font-size: 12px; padding: 7px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--ink); color: var(--white); outline: none; transition: border-color .12s; width: 100%; }
  input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus { border-color: rgba(255,255,255,.4); }
  input::placeholder, textarea::placeholder { color: var(--gray-dim); }
  input[type=number] { text-align: right; font-family: var(--mono); -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .filter-input { font-size: 11px; padding: 5px 12px; border-radius: 20px; width: 160px; }
  .tbi { background: transparent !important; border: none !important; border-bottom: 1px solid var(--line) !important; border-radius: 0 !important; color: var(--white) !important; font-family: var(--mono) !important; font-size: 11px !important; padding: 2px 0 !important; text-align: right !important; outline: none !important; width: 100% !important; -moz-appearance: textfield !important; }
  .tbi:focus { border-bottom-color: rgba(255,255,255,.4) !important; }
  .tbi::-webkit-inner-spin-button, .tbi::-webkit-outer-spin-button { -webkit-appearance: none; }
  .dz { border: 1px dashed var(--line); border-radius: 10px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; background: var(--ink); user-select: none; transition: border-color .15s, background .15s; }
  .dz:hover { background: var(--card); border-color: rgba(255,255,255,.28); }
  .dz.ok { border-style: solid; border-color: var(--green); background: rgba(62,207,116,.07); }
  .dz-title { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
  .dz-sub { font-family: var(--sans); font-size: 11px; color: var(--gray-dim); }
  .delta-pill { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .pill-pos { background: rgba(62,207,116,.15); color: var(--green); }
  .pill-neg { background: rgba(240,82,82,.15); color: var(--red); }
  .pill-neu { background: rgba(255,255,255,.06); color: var(--gray-dim); }
  .tbl { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1380px; }
  .tbl thead th { padding: 9px 16px; border-bottom: 1px solid var(--line); color: var(--gray-dim); font-family: var(--mono); font-weight: 500; font-size: 9px; text-transform: uppercase; letter-spacing: .09em; text-align: left; white-space: nowrap; background: var(--ink); position: sticky; top: 0; z-index: 5; }
  .tbl thead th.num { text-align: right; }
  .tbl thead th.sortable { cursor: pointer; }
  .tbl thead th.sortable:hover, .tbl thead th.on { color: var(--white); }
  .tbl tbody tr:nth-child(odd) td { background: var(--black); }
  .tbl tbody tr:nth-child(even) td { background: var(--ink); }
  .tbl tbody tr:hover td { background: var(--card) !important; }
  .tbl td { padding: 10px 16px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; color: var(--white); white-space: nowrap; }
  .tbl td.num { text-align: right; font-family: var(--mono); font-size: 11px; }
  .tbl thead th:first-child, .tbl td:first-child { position: sticky; left: 0; box-shadow: 1px 0 0 var(--line); }
  .tbl thead th:first-child { z-index: 3; background: var(--ink); }
  .tbl tbody tr:nth-child(odd) td:first-child { background: var(--black); }
  .tbl tbody tr:nth-child(even) td:first-child { background: var(--ink); }
  .tbl tbody tr:hover td:first-child { background: var(--card) !important; }
  .tbl tfoot td { padding: 10px 16px; border-top: 1px solid var(--line); background: var(--card-2); font-family: var(--mono); font-size: 11px; font-weight: 500; white-space: nowrap; }
  .tbl tfoot td:first-child { position: sticky; left: 0; z-index: 1; background: var(--card-2); box-shadow: 1px 0 0 var(--line); }
  .sort-icon { font-size: 9px; margin-left: 3px; opacity: .3; }
  .sort-icon.active { opacity: 1; color: var(--white); }
  .tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--line); background: var(--black); margin: 0 24px; }
  .rem-pill { display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line); }
  .rem-pill.empty { color: var(--gray-dim); }
  .rem-pill.ok { border-color: rgba(62,207,116,.4); color: var(--green); }
  .rem-pill.over { border-color: rgba(240,82,82,.4); color: var(--red); }
  .rem-pill.low { border-color: var(--line); color: var(--gray); }
  .rem-pill .rem-amt { font-family: var(--mono); font-size: 18px; font-weight: 500; }
  .rem-pill .rem-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: .1em; text-transform: uppercase; opacity: .7; }
  .alloc-track { height: 6px; background: var(--ink); border: 1px solid var(--line); border-radius: 4px; position: relative; overflow: hidden; min-width: 220px; }
  .alloc-fill { position: absolute; top: 0; height: 100%; transition: all .22s; }
  .sep { width: 1px; height: 28px; background: var(--line); flex-shrink: 0; }
  .fin-panel { border-top: 1px solid var(--line); }
  .fin-output { font-family: var(--mono); font-size: 11px; line-height: 1.8; white-space: pre-wrap; background: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 16px 18px; color: var(--white); max-height: 320px; overflow-y: auto; }
  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .upload-grid { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .g3 { grid-template-columns: repeat(2,1fr); } .g2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="grain"></div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>



const {useState,useCallback,useMemo}=React,ce=React.createElement;
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const Mo=m=>MO[m],Mo3=m=>MO[m].slice(0,3);

function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function pfn(name){const m=name.match(/_(\d{4})(\d{2})(\d{2})\d+_/);if(m)return{year:+m[1],month:+m[2]-1,day:+m[3]};const n=new Date();return{year:n.getFullYear(),month:n.getMonth(),day:n.getDate()};}

async function pDSP(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const sh=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(sh,{header:1});
        if(rows.length<2){res([]);return;}
        const hn=rows[0].map(h=>String(h||'').trim().toLowerCase());
        const g=n=>hn.indexOf(n.toLowerCase());
        const F={
          name:g('ad group name'),
          cost:g('total cost'),
          budget:g('line item budget'),
          ecpm:g('ecpm'),
          ctr:g('ctr'),
          roas:g('roas'),
          ntb:g('new-to-brand roas'),
          dpvr:g('dpvr'),
          sales:g('total product sales'),
          ntbSales:g('new-to-brand product sales'),
        };
        res(rows.slice(1).filter(r=>r[F.name]).map(r=>({
          name:String(r[F.name]).trim().replace(/\s+/g,' '),
          cost:+(r[F.cost])||0,
          budget:+(r[F.budget])||0,
          ecpm:+(r[F.ecpm])||0,
          ctr:+(r[F.ctr])||0,
          roas:+(r[F.roas])||0,
          ntb:+(r[F.ntb])||0,
          dpvr:+(r[F.dpvr])||0,
          sales:F.sales>=0?+(r[F.sales])||0:0,
          ntbSales:F.ntbSales>=0?+(r[F.ntbSales])||0:0,
        })));
      }catch(e){res([]);}
    };
    r.readAsBinaryString(file);
  });
}

function mergeItems(mtd,lt,de,dr){
  const d=de+dr;
  const lm={};lt.forEach(r=>{lm[r.name]=r;});
  return mtd.map((m,i)=>{
    const l=lm[m.name]||{cost:0,budget:0};
    const bnb=m.name.split('|').map(p=>p.trim()).find(p=>p==='B'||p==='NB')||'NB';
    const isP=/performance/i.test(m.name);
    const dr2=de>0?m.cost/de:0;
    const er=dr2*dr;
    const eoLt=Math.ceil((l.cost+er)/10)*10;
    return{
      id:i,name:m.name,bnb,isP,
      mtd:m.cost,lt:l.cost,dr:dr2,
      estM:dr2*d,er,eoLt,bud:'',
      ecpm:m.ecpm,ctr:m.ctr,roas:m.roas,ntb:m.ntb,dpvr:m.dpvr,
      sales:m.sales,ntbSales:m.ntbSales,
    };
  });
}

function calcSplits(its){
  const t=its.reduce((s,i)=>s+(parseFloat(i.bud)||0),0);
  const nb=its.filter(i=>i.bnb==='NB').reduce((s,i)=>s+(parseFloat(i.bud)||0),0);
  const b=its.filter(i=>i.bnb==='B').reduce((s,i)=>s+(parseFloat(i.bud)||0),0);
  const p=its.filter(i=>i.isP).reduce((s,i)=>s+(parseFloat(i.bud)||0),0);
  return{t,nb,b,p,nbP:t?nb/t:0,bP:t?b/t:0,pP:t?p/t:0};
}

// Weighted-average totals: ROAS = total sales / total spend; NTB ROAS = total NTB sales / total spend
function calcMetricTotals(its){
  const totCost=its.reduce((s,i)=>s+i.mtd,0);
  const totSales=its.reduce((s,i)=>s+i.sales,0);
  const totNtbSales=its.reduce((s,i)=>s+i.ntbSales,0);
  const wavg=fn=>{if(!totCost)return 0;return its.reduce((s,i)=>s+fn(i)*i.mtd,0)/totCost;};
  return{
    roas:totCost>0?totSales/totCost:0,
    ntb:totCost>0?totNtbSales/totCost:0,
    ecpm:wavg(i=>i.ecpm),
    ctr:wavg(i=>i.ctr),
    dpvr:wavg(i=>i.dpvr),
    sales:totSales,
    ntbSales:totNtbSales,
  };
}

const np=i=>i.eoLt+(parseFloat(i.bud)||0);
const f2=n=>{const v=+n;return(v||v===0)?'$'+v.toFixed(2):'—'};
const fK=n=>{const v=+n;if(!v&&v!==0)return'—';return Math.abs(v)>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+Math.abs(v).toFixed(0)};
const fX=n=>{const v=+n;return v?v.toFixed(2)+'x':'—'};
const fD=n=>{const v=+n;return v?(v*100).toFixed(3)+'%':'—'};
const fC=n=>{const v=+n;return v?(v*100).toFixed(2)+'%':'—'};
const fE=n=>{const v=+n;return v?'$'+v.toFixed(2):'—'};
const EP=()=>({fns:{mtd:null,lt:null},infos:{mtd:null,lt:null},rf:{mtd:null,lt:null},items:[],bud:'',srt:{k:'name',d:'asc'}});

// ---------- BUDGET REMAINING PILL ----------
function RemPill({allocated,target}){
  const rem=target-allocated;
  const pct=target>0?allocated/target:0;
  let cls='empty',lbl='No Target Set',amt='—';
  if(target>0){
    if(rem<0){cls='over';lbl='OVER BUDGET';amt='-'+fK(Math.abs(rem));}
    else if(pct>=0.97){cls='ok';lbl='FULLY ALLOCATED';amt=rem<=0?'$0':'$'+rem.toFixed(0)+' left';}
    else if(pct>=0.8){cls='low';lbl='ALMOST THERE';amt=fK(rem)+' left';}
    else{cls='empty';lbl='REMAINING';amt=fK(rem);}
  }
  return ce('div',{className:`rem-pill ${cls}`},ce('div',null,ce('div',{className:'rem-amt'},amt),ce('div',{className:'rem-lbl'},lbl)),target>0&&ce('span',{style:{fontFamily:'var(--mono)',fontSize:'.7rem',opacity:.7}},(pct*100).toFixed(0)+'% of '+fK(target)));
}

// ---------- STACKED ALLOC BAR ----------
function AllocBar({sp}){
  return ce('div',{style:{display:'flex',flexDirection:'column',gap:6,minWidth:220}},
    ce('div',{className:'alloc-track'},
      [sp.nbP>0&&ce('div',{key:'nb',className:'alloc-fill',style:{left:0,width:(sp.nbP*100)+'%',background:'var(--white)'}}),
       sp.bP>0&&ce('div',{key:'b',className:'alloc-fill',style:{left:(sp.nbP*100)+'%',width:(sp.bP*100)+'%',background:'var(--gray)'}}),
       sp.pP>0&&ce('div',{key:'p',className:'alloc-fill',style:{left:((sp.nbP+sp.bP)*100)+'%',width:(sp.pP*100)+'%',background:'var(--green)'}})]),
    ce('div',{style:{display:'flex',gap:14,flexWrap:'wrap'}},
      ...[{lbl:'NB',pct:sp.nbP,tgt:.8,col:'var(--white)'},{lbl:'B',pct:sp.bP,tgt:.2,col:'var(--gray)'},{lbl:'P+',pct:sp.pP,tgt:.1,col:'var(--green)'}].map(({lbl,pct,tgt,col})=>{
        const hit=pct>0&&Math.abs(pct-tgt)<=.05;
        const c=pct===0?'var(--gray-dim)':hit?'var(--green)':'var(--gray)';
        return ce('div',{key:lbl,style:{display:'flex',alignItems:'center',gap:5,fontSize:'.7rem',fontFamily:'var(--mono)'}},
          ce('div',{style:{width:6,height:6,background:col,flexShrink:0,borderRadius:1}}),
          ce('span',{style:{color:'var(--gray)'}},(lbl+' ')),
          ce('span',{style:{color:c}},pct>0?(pct*100).toFixed(0)+'%':'—'),
          ce('span',{style:{color:'var(--gray-dim)'}},'/'+(tgt*100).toFixed(0)+'%'));
      })
    )
  );
}

// ---------- UPLOAD SCREEN ----------
function DropZone({id,filename,info,hint,onFile}){
  const ref=React.useRef(null);
  const [over,setOver]=React.useState(false);

  React.useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    let n=0;
    const enter=e=>{e.preventDefault();n++;setOver(true);};
    const over_=e=>{e.preventDefault();};
    const leave=e=>{n--;if(n<=0){n=0;setOver(false);}};
    const drop=e=>{
      e.preventDefault();n=0;setOver(false);
      const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
      if(f)onFile(f);
    };
    el.addEventListener('dragenter',enter);
    el.addEventListener('dragover',over_);
    el.addEventListener('dragleave',leave);
    el.addEventListener('drop',drop);
    return()=>{
      el.removeEventListener('dragenter',enter);
      el.removeEventListener('dragover',over_);
      el.removeEventListener('dragleave',leave);
      el.removeEventListener('drop',drop);
    };
  },[onFile]);

  const cls='dz'+(filename?' ok':'')+(over&&!filename?' ok':'');
  return ce('div',{ref,className:cls,onClick:()=>document.getElementById(id).click()},
    ce('input',{id,type:'file',accept:'.xlsx',style:{display:'none'},onChange:e=>{if(e.target.files[0])onFile(e.target.files[0]);}}),
    filename
      ?ce('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:3}},
          ce('div',{className:'dz-title',style:{color:'var(--green)'}},'Loaded'),
          ce('div',{className:'dz-sub',style:{fontFamily:'var(--mono)',wordBreak:'break-all'}},filename),
          info&&ce('div',{className:'dz-sub',style:{color:'var(--green)',marginTop:2}},info)
        )
      :ce('div',null,
          ce('div',{className:'dz-title'},'Drop or click to upload'),
          ce('div',{className:'dz-sub'},hint)
        )
  );
}

function PackageSection({pkg,label,pkgData,onDrop}){
  return ce('div',{className:'card',style:{display:'flex',flexDirection:'column',gap:12}},
    ce('div',{className:'slbl',style:{marginBottom:0}},label),
    ce('div',{className:'upload-grid'},
      ce('div',null,
        ce('div',{className:'slbl'},'MTD Report'),
        ce(DropZone,{id:'dz-'+pkg+'-mtd',filename:pkgData.fns.mtd,info:pkgData.infos.mtd,hint:'Current month metrics',onFile:f=>onDrop(f,pkg,'mtd')})
      ),
      ce('div',null,
        ce('div',{className:'slbl'},'Lifetime Report'),
        ce(DropZone,{id:'dz-'+pkg+'-lt',filename:pkgData.fns.lt,info:pkgData.infos.lt,hint:'Cumulative spend',onFile:f=>onDrop(f,pkg,'lt')})
      )
    )
  );
}

function UploadScreen({pkgs,onDrop,onProceed}){
  const can=(pkgs.conv.fns.mtd&&pkgs.conv.fns.lt)||(pkgs.con.fns.mtd&&pkgs.con.fns.lt);
  return ce('div',{className:'container',style:{padding:'40px 24px'}},
    ce('div',{style:{marginBottom:28}},
      ce('div',{className:'app-title'},'PLTFRM'),
      ce('div',{className:'results-sub'},'DSP Media Planner')
    ),
    ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}},

// --------------------------------------------------------------------------
// PRIME DAY / TENTPOLE EVENT PLANNER
// Standalone budgeting: three phases (Lead up, Event, Lead out) x two packages.
// User inputs days-per-phase and phase totals; app derives avg daily + % of spend.
// --------------------------------------------------------------------------
const PHASES=['leadUp','event','leadOut'];
const PHASE_LABELS={leadUp:'Lead Up',event:'Event',leadOut:'Lead Out'};
const EMPTY_EV=()=>({leadUp:'',event:'',leadOut:''});

function fmtMoney(n){
  const v=+n;if(!v&&v!==0)return '$0.00';
  return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function EventBreakdown({title,vals,days,onChange,editable}){
  // vals: {leadUp,event,leadOut} dollar strings; days: {leadUp,event,leadOut} numbers
  const num=p=>parseFloat(vals[p])||0;
  const grand=PHASES.reduce((s,p)=>s+num(p),0);
  const daily=p=>{const d=parseFloat(days[p])||0;return d>0?num(p)/d:0;};
  const pct=p=>grand>0?num(p)/grand:0;

  return ce('div',{style:{marginBottom:24}},
    ce('div',{className:'tbl-wrap',style:{margin:0}},
      ce('table',{className:'tbl',style:{minWidth:680}},
        ce('thead',null,
          ce('tr',null,
            ce('th',{colSpan:5,style:{textAlign:'center',color:'var(--white)',fontSize:11,letterSpacing:'.08em',background:'var(--card-2)'}},title)
          ),
          ce('tr',null,
            ce('th',null,''),
            ...PHASES.map(p=>ce('th',{key:p,className:'num'},PHASE_LABELS[p])),
            ce('th',{className:'num'},'Total')
          )
        ),
        ce('tbody',null,
          // Total spend row (editable inputs if editable)
          ce('tr',null,
            ce('td',{style:{fontFamily:'var(--sans)',fontWeight:600,color:'var(--white)'}},title.replace(' DSP Daily Spend Breakdown','')),
            ...PHASES.map(p=>ce('td',{key:p,className:'num'},
              editable
                ? ce('input',{type:'number',className:'tbi',placeholder:'0',value:vals[p],onChange:ev=>onChange(p,ev.target.value),style:{minWidth:90}})
                : fmtMoney(num(p))
            )),
            ce('td',{className:'num',style:{fontWeight:600,color:'var(--white)'}},fmtMoney(grand))
          ),
          // Avg daily spend row
          ce('tr',null,
            ce('td',{style:{color:'var(--gray)'}},'Avg Daily Spend'),
            ...PHASES.map(p=>ce('td',{key:p,className:'num',style:{color:'var(--gray)'}},fmtMoney(daily(p)))),
            ce('td',{className:'num'},'')
          ),
          // % of spend row
          ce('tr',null,
            ce('td',{style:{fontWeight:600,color:'var(--white)'}},'% of Spend'),
            ...PHASES.map(p=>ce('td',{key:p,className:'num',style:{color:'var(--gray)'}},grand>0?(pct(p)*100).toFixed(0)+'%':'-')),
            ce('td',{className:'num'},'')
          )
        )
      )
    )
  );
}

function EventPlanner({ev,setEv,days,setDays}){
  // ev = {conv:{leadUp,event,leadOut}, con:{...}}
  const setVal=(pkg,phase,v)=>setEv(e=>({...e,[pkg]:{...e[pkg],[phase]:v}}));
  const setDay=(phase,v)=>setDays(d=>({...d,[phase]:v}));

  // DSP Total = Conversion + Consideration per phase
  const totalVals={};
  PHASES.forEach(p=>{
    totalVals[p]=((parseFloat(ev.conv[p])||0)+(parseFloat(ev.con[p])||0)).toString();
  });

  return ce('div',{style:{padding:'24px',maxWidth:1060,margin:'0 auto'}},
    // Days-per-phase inputs
    ce('div',{className:'card',style:{marginBottom:24}},
      ce('div',{className:'slbl',style:{marginBottom:12}},'Days Per Phase'),
      ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}},
        ...PHASES.map(p=>ce('div',{key:p},
          ce('div',{className:'mc-lbl',style:{marginBottom:6}},PHASE_LABELS[p]+' Days'),
          ce('input',{type:'number',placeholder:'0',value:days[p],onChange:ev2=>setDay(p,ev2.target.value),style:{width:'100%'}})
        ))
      )
    ),
    // Conversion
    ce(EventBreakdown,{title:'Conversion DSP Daily Spend Breakdown',vals:ev.conv,days,onChange:(p,v)=>setVal('conv',p,v),editable:true}),
    // Consideration
    ce(EventBreakdown,{title:'Consideration DSP Daily Spend Breakdown',vals:ev.con,days,onChange:(p,v)=>setVal('con',p,v),editable:true}),
    // DSP Total (derived, not editable)
    ce(EventBreakdown,{title:'DSP Total',vals:totalVals,days,onChange:()=>{},editable:false})
  );
}

function App(){
  const [step,setStep]=useState('upload');
  const [pkgs,setPkgs]=useState({conv:EP(),con:EP()});
  
  
  
  const [di,setDi]=useState({de:0,dr:0,dim:0,avg:0,month:null});
  const priorM=di.month;
  const planM=di.month!==null?(di.month===11?0:di.month+1):null;
  const [tab,setTab]=useState('conv');
  const [ev,setEv]=useState({conv:EMPTY_EV(),con:EMPTY_EV()});
  const [evDays,setEvDays]=useState({leadUp:'',event:'',leadOut:''});
  const [cp,setCp]=useState(false);
  

  const onDrop=useCallback((file,pkg,type)=>{
    if(!file||!file.name.endsWith('.xlsx'))return;
    setPkgs(p=>({...p,[pkg]:{...p[pkg],fns:{...p[pkg].fns,[type]:file.name},rf:{...p[pkg].rf,[type]:file}}}));
    if(type==='mtd'){
      const {year,month,day}=pfn(file.name);
      const d=daysInMonth(year,month);
      // MTD report pulled on `day` contains data through the prior day.
      // Days elapsed = day-1 (completed days); days remaining = everything from the pull date onward (includes today).
      const de=Math.max(1,day-1);const dr=d-de;
      setDi(x=>({...x,de,dr,dim:d,month}));
      setPkgs(p=>({...p,[pkg]:{...p[pkg],infos:{...p[pkg].infos,mtd:`${de} days of data · ${dr} days remaining`}}}));
    }
  },[]);

  const onProc=useCallback(async()=>{
    const run=async(pkg)=>{
      const rf=pkgs[pkg].rf;if(!rf.mtd||!rf.lt)return;
      const[m,l]=await Promise.all([pDSP(rf.mtd),pDSP(rf.lt)]);
      const merged=mergeItems(m,l,di.de,di.dr);
      const avg=di.de>0?merged.reduce((s,i)=>s+i.mtd,0)/di.de:0;
      setPkgs(p=>({...p,[pkg]:{...p[pkg],items:merged}}));
      if(pkg==='conv')setDi(x=>({...x,avg}));
    };
    await Promise.all(['conv','con'].map(run));
    setStep('plan');
  },[pkgs,di]);

  const setIB=useCallback((pkg,id,v)=>setPkgs(p=>({...p,[pkg]:{...p[pkg],items:p[pkg].items.map(i=>i.id===id?{...i,bud:v}:i)}})),[]);

  const ap=pkgs[tab]||EP();
  const sp=useMemo(()=>calcSplits(ap.items),[ap.items]);
  const sortedItems=useMemo(()=>{

      let bv=k==='proj'?np(b):k==='bud'?(parseFloat(b.bud)||0):b[k];
      if(typeof av==='string')return d==='asc'?av.localeCompare(bv):bv.localeCompare(av);
      return d==='asc'?av-bv:bv-av;

  },[ap.items,ap.srt]);

  const tots=useMemo(()=>ap.items.reduce((a,i)=>({e:a.e+i.estM}),{e:0}),[ap.items]);
  const tgt=parseFloat(ap.bud)||0;

  const copyTSV=()=>{
    const hdr=['Line Item','B/NB','P+','MTD Spend','Est. Month','LT Spend','Est. EOMonth LT',(planM!==null?Mo(planM):'Plan')+' Budget','New Proj','Product Sales','NTB Sales','eCPM','CTR','ROAS','NTB ROAS','DPVR'];
    const rows=sortedItems.map(i=>{
      const ir=i.mtd>0?i.sales/i.mtd:0;const in_=i.mtd>0?i.ntbSales/i.mtd:0;

    });

    const tr=['TOTAL','','',f2(t2.m),f2(t2.e),f2(t2.l),f2(t2.eo),f2(t2.b),f2(t2.p),t2.s>0?f2(t2.s):'—',t2.ns>0?f2(t2.ns):'—',(mt.ntb>0?fX(mt.ntb):'—'),(mt.roas>0?fX(mt.roas):'—'),'',''];

        ce('span',{style:{display:'inline-flex',alignItems:'center',gap:8}},ce('span',{style:{display:'inline-block',width:5,height:18,background:'var(--white)'}}),ce('span',{style:{fontFamily:'var(--sans)',fontSize:'.72rem',letterSpacing:'.34em',color:'var(--gray)',fontWeight:500}},'PLTFRM')),
        ce('span',{style:{fontSize:11,color:'var(--gray-dim)',padding:'2px 7px',background:'var(--card-2)',borderRadius:4,border:'1px solid var(--line-soft)'}},(priorM!==null?Mo(priorM):'?')+' / '+(planM!==null?Mo(planM):'?'))
      ),
      ce('div',{style:{display:'flex',gap:8,marginLeft:'auto'}},
        tab!=='event'&&ce('button',{className:'btn-secondary',onClick:copyTSV},cp?'Copied':'Copy TSV'),
        ce('button',{className:'btn-secondary',onClick:()=>setStep('upload')},'Back')
      )
    ),
    ce('div',{style:{background:'var(--card)',borderBottom:'1px solid var(--line)',padding:'10px 20px',display:'flex',gap:6,flexWrap:'wrap'}},
      ['conv','con'].map(t=>ce('button',{key:t,className:`tnav${tab===t?' on':''}`,onClick:()=>setTab(t)},
        {conv:'Conversion',con:'Consideration'}[t],
        pkgs[t].items.length>0&&ce('span',{style:{fontSize:'.75em',opacity:.5,marginLeft:5}},pkgs[t].items.length)
      )),
      ce('button',{key:'event',className:`tnav${tab==='event'?' on':''}`,onClick:()=>setTab('event'),style:{marginLeft:'auto'}},'Prime Day / Tentpole')
    ),
    // Prime Day / tentpole planner (standalone)
    tab==='event'
      ? ce(EventPlanner,{ev,setEv,days:evDays,setDays:setEvDays})

              ce(AllocBar,{sp}),
              ce('div',{className:'sep'}),
              ce('div',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--gray-dim)'}},`${di.de} days of data  /  ${di.dr} days remaining of ${di.dim}`+(di.avg>0?`  /  $${di.avg.toFixed(0)}/day avg`:''))
            )
          ),
          ce(PlanTable,{items:sortedItems,onSet:(id,v)=>setIB(tab,id,v),planM,srt:ap.srt,onSort:k=>setSort(tab,k)}),
          ce(FinalizePanel,{items:ap.items,planM})
        )
  );
}

// Prevent mouse-wheel from changing focused number inputs
document.addEventListener('wheel',function(e){
  const el=document.activeElement;
  if(el&&el.type==='number'&&el===e.target){el.blur();}
},{passive:true});
ReactDOM.createRoot(document.getElementById('root')).render(ce(App));



</script>
</body>
</html>
